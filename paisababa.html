<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MarketMood</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: white;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .markets {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      background: #1a1a1a;
      width: 120px;
    }

    .green { color: #00ff99; }
    .red { color: #ff4d4d; }

    .character {
      margin: 30px 0;
    }

    .character img {
      width: 120px;
    }

    .character-text {
      font-size: 20px;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00ff99;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    .news {
      margin-top: 30px;
      font-size: 14px;
      color: #ccc;
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
    }

    .popup button {
      margin: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🌍 MarketMood</h1>

  <!-- Market Cards -->
  <div class="markets">
    <div class="card">
      <h3>Nifty</h3>
      <p id="nifty" class="green">Loading...</p>
    </div>
    <div class="card">
      <h3>S&P 500</h3>
      <p id="sp500" class="red">Loading...</p>
    </div>
  </div>

  <!-- Character -->
  <div class="character">
    <img id="characterImg" src="https://i.imgur.com/6X4Z8Qx.png">
    <div class="character-text" id="characterText">Loading mood...</div>
  </div>

  <!-- Button -->
  <button onclick="openPopup()">Predict Tomorrow</button>

  <!-- News -->
  <div class="news" id="news">
    Fetching market reason...
  </div>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h3>Will Nifty go up tomorrow?</h3>
    <button onclick="predict('UP')">UP 📈</button>
    <button onclick="predict('DOWN')">DOWN 📉</button>
  </div>
</div>

<script>
  // 🔑 PUT YOUR API KEY HERE
  const API_KEY = "G7EZKT43RQK203BH";

  async function fetchMarketData() {
    try {
      // Example using Alpha Vantage (Nifty ETF + S&P ETF)
      const niftyRes = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=NIFTYBEES.NS&apikey=${API_KEY}`);
      const niftyData = await niftyRes.json();

      const spRes = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=${API_KEY}`);
      const spData = await spRes.json();

      let niftyChange = parseFloat(niftyData["Global Quote"]["10. change percent"]);
      let spChange = parseFloat(spData["Global Quote"]["10. change percent"]);

      document.getElementById("nifty").innerText = niftyChange.toFixed(2) + "%";
      document.getElementById("sp500").innerText = spChange.toFixed(2) + "%";

      updateCharacter(niftyChange);

    } catch (err) {
      console.log(err);
      document.getElementById("characterText").innerText = "Error loading data 😕";
    }
  }

  function updateCharacter(change) {
    let text = "";
    let img = "";

    if (change > 0.5) {
      text = "Markets are flying 🚀";
      img = "https://i.imgur.com/6X4Z8Qx.png";
    } else if (change < -0.5) {
      text = "Yeah… it's bad today 💀";
      img = "https://i.imgur.com/Z6X4Z8Q.png";
    } else {
      text = "Markets are just chilling 😐";
      img = "https://i.imgur.com/6X4Z8Qx.png";
    }

    document.getElementById("characterText").innerText = text;
    document.getElementById("characterImg").src = img;
  }

  function openPopup() {
    document.getElementById("popup").style.display = "flex";
  }

  function predict(choice) {
    alert("You predicted: " + choice);
    document.getElementById("popup").style.display = "none";
  }

  fetchMarketData();
</script>

</body>
</html>
